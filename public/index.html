<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch YouTube to MP3</title>

<link href="https://fonts.bunny.net/css?family=poppins:400,500,700" rel="stylesheet"/>

<style>
body{
  font-family:Poppins;
  background:linear-gradient(135deg,#4d79ff,#1e1e50);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  background:#fff;
  padding:25px;
  border-radius:12px;
  width:100%;
  max-width:650px;
}

h1{text-align:center;margin-bottom:20px;}

.input-row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

input{
  flex:1;
  padding:10px;
}

button{
  padding:10px;
  cursor:pointer;
}

.thumb{
  display:flex;
  gap:10px;
  margin-bottom:15px;
  align-items:center;
}

.thumb img{
  width:120px;
  border-radius:6px;
}

.meta{
  font-size:14px;
}

.controls{
  display:flex;
  gap:10px;
  margin:10px 0;
}

.result{
  margin-top:15px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<h1>YouTube → MP3</h1>

<div id="inputs"></div>

<div class="controls">
<button onclick="addInput()">➕</button>
<button onclick="removeInput()">➖</button>

<select id="bitrate">
<option value="128K">128K</option>
<option value="192K" selected>192K</option>
<option value="320K">320K</option>
</select>

<!-- 🔥 TEST LINKS DROPDOWN -->
<select id="testLinks" onchange="applyTestLink(this)"></select>

</div>

<div style="margin:10px 0;">
<label>
<input type="checkbox" id="forever">
♾️ Forever Mode
</label>
</div>

<button onclick="convertAll()">Convert All</button>

<div id="results" class="result"></div>
</div>

<script>
//////////////////////////////////////////////////////////
// 🔥 EDIT YOUR TEST LINKS HERE
//////////////////////////////////////////////////////////
const TEST_LINKS = [
  { name: "Future Garage Mix", url: "https://youtu.be/3nZn0uBccLk" },
  { name: "LoFi Focus Mix", url: "https://youtu.be/cKVr22fkxMc" }
];

//////////////////////////////////////////////////////////
// INIT DROPDOWN
//////////////////////////////////////////////////////////
function initDropdown(){
  const select = document.getElementById('testLinks');

  select.innerHTML = `<option value="">-- Quick Test Links --</option>`;

  TEST_LINKS.forEach(link=>{
    const opt = document.createElement('option');
    opt.value = link.url;
    opt.textContent = link.name;
    select.appendChild(opt);
  });
}

//////////////////////////////////////////////////////////
function applyTestLink(select){
  const url = select.value;
  if(!url) return;

  const input = document.querySelector('#inputs input');
  input.value = url;
  fetchMeta(input);
}

//////////////////////////////////////////////////////////
let count = 0;

function addInput(){
  count++;

  const div = document.createElement('div');
  div.className = 'input-block';
  div.innerHTML = `
    <div class="input-row">
      <input type="text" placeholder="Paste YouTube URL" oninput="fetchMeta(this)">
    </div>
    <div class="thumb" style="display:none;">
      <img>
      <div class="meta"></div>
    </div>
  `;

  document.getElementById('inputs').appendChild(div);
}

function removeInput(){
  const container = document.getElementById('inputs');
  if(container.children.length > 1){
    container.removeChild(container.lastChild);
  }
}

addInput();
initDropdown();

//////////////////////////////////////////////////////////
async function fetchMeta(input){
  const url = input.value.trim();
  if(!url) return;

  try{
    const res = await fetch('/info',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url})
    });

    const data = await res.json();

    if(res.ok){
      const block = input.closest('.input-block');
      const thumb = block.querySelector('.thumb');
      const img = thumb.querySelector('img');
      const meta = thumb.querySelector('.meta');

      img.src = data.thumbnail;
      meta.innerHTML = `
        <b>${data.title}</b><br>
        Duration: ${data.duration}s
      `;

      thumb.style.display = 'flex';
    }

  }catch(e){
    console.log(e);
  }
}

//////////////////////////////////////////////////////////
async function convertAll(){

  const inputs = document.querySelectorAll('#inputs input');
  const bitrate = document.getElementById('bitrate').value;
  const forever = document.getElementById('forever').checked;

  const results = document.getElementById('results');
  results.innerHTML = "WAIT...";

  const promises = [];

  inputs.forEach(input=>{
    if(input.value.trim()){

      const statusDiv = document.createElement('div');
      statusDiv.innerHTML = "CONVERTING...";
      results.appendChild(statusDiv);

      promises.push(
        fetch('/convert',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            url: input.value,
            bitrate,
            forever
          })
        })
        .then(r=>r.json())
        .then(d=>{

          if(d.status === 'forever_started'){
            statusDiv.innerHTML = "♾️ FOREVER MODE ACTIVE";
            return;
          }

          if(d.filePath){
            statusDiv.innerHTML = `
              CONVERSION SUCCESSFUL<br>
              DOWNLOADING COMPLETE<br>
              SAVED FILE:<br>
              ${d.fileName}<br>
              <a href="${d.filePath}" download>Download</a>
            `;
            return;
          }

          statusDiv.innerHTML = "ERROR";
        })
        .catch(()=>{
          statusDiv.innerHTML = "ERROR";
        })
      );
    }
  });

  await Promise.all(promises);
}
</script>

</body>
</html>
